# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "aefba6b579ba2421d9ba1283e927631a"
name = "customer-loyality-points"
application_url = "https://YOUR-APP.ondigitalocean.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2025-07"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

  [[webhooks.subscriptions]]
  topics = [ "refunds/create" ]
  uri = "/webhooks/refunds/create"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  # GDPR compliance webhooks — mandatory for Shopify App Store
  [[webhooks.subscriptions]]
  topics = [ "customers/data_request" ]
  uri = "/webhooks/customers/data_request"

  [[webhooks.subscriptions]]
  topics = [ "customers/redact" ]
  uri = "/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  topics = [ "shop/redact" ]
  uri = "/webhooks/shop/redact"

[access_scopes]
scopes = "read_orders,read_customers,write_customers,write_discounts,read_discounts,write_price_rules,read_price_rules"

[auth]
redirect_urls = [ "https://YOUR-APP.ondigitalocean.app/auth/callback" ]
