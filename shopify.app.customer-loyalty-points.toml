client_id = "27e486f026aff345ef0a0726f372b1c3"
name = "Customer-Loyalty-Points"
application_url = "https://152-42-219-217.sslip.io"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

  [[webhooks.subscriptions]]
  topics = [ "refunds/create" ]
  uri = "/webhooks/refunds/create"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"


[access_scopes]
scopes = "read_customers,read_discounts,read_orders,read_price_rules,write_customers,write_discounts,write_price_rules"

[auth]
redirect_urls = [
  "https://152-42-219-217.sslip.io/auth/callback",
  "https://152-42-219-217.sslip.io/auth/shopify/callback",
  "https://152-42-219-217.sslip.io/api/auth/callback"
]
